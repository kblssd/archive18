<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<title>archive18 — Quiz</title>
<style>
  :root{
    --ink:#111; --line:#000; --muted:#666; --bg:#fff;
    --good:#1f7a3d; --good-bg:#e8f6ec; --bad:#b00020; --bad-bg:#fdeaec;
    --soft:#f4f4f4; --chip:#f0f0f0;
  }
  *{box-sizing:border-box}
  body,html{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:"Lexend",sans-serif;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  .wrap{max-width:780px;margin:0 auto;padding:24px 20px 80px}

  header{display:flex;align-items:baseline;justify-content:space-between;gap:12px;
    border-bottom:2px solid var(--line);padding-bottom:14px;margin-bottom:18px;flex-wrap:wrap}
  .brand{font-size:1.9rem;font-weight:700;letter-spacing:-.5px}
  .brand span{font-weight:300;color:var(--muted)}
  .study-link{font-size:.95rem;text-decoration:none;border:2px solid var(--line);
    border-radius:6px;padding:7px 13px;font-weight:500;white-space:nowrap;transition:background .15s}
  .study-link:hover{background:var(--soft)}

  .toolbar{display:flex;gap:14px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-bottom:14px}
  .modes{display:inline-flex;border:2px solid var(--line);border-radius:8px;overflow:hidden}
  .modes button{font-family:inherit;font-size:.92rem;font-weight:500;border:0;background:#fff;
    padding:9px 15px;cursor:pointer;transition:background .15s;border-right:2px solid var(--line)}
  .modes button:last-child{border-right:0}
  .modes button.active{background:var(--ink);color:#fff}
  select{font-family:inherit;font-size:.92rem;padding:9px 12px;border:2px solid var(--line);
    border-radius:8px;background:#fff;cursor:pointer;font-weight:500}

  .stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
  .stat{flex:1;min-width:90px;border:2px solid var(--line);border-radius:8px;padding:10px 12px;text-align:center}
  .stat .lbl{font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .stat .val{font-size:1.5rem;font-weight:700;line-height:1.1}
  .stat .fire{font-size:1.1rem}

  .card{border:2px solid var(--line);border-radius:14px;padding:30px 26px;min-height:230px;
    display:flex;flex-direction:column;gap:16px;position:relative}
  .chip{align-self:flex-start;font-size:.72rem;font-weight:600;letter-spacing:.04em;
    background:var(--chip);border-radius:20px;padding:4px 12px;color:#333}
  .q-label{font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .q-text{font-size:1.5rem;font-weight:600;line-height:1.35}
  .q-text.def{font-size:1.22rem;font-weight:500;line-height:1.5}

  /* flashcard */
  .flash-front{font-size:2rem;font-weight:700;line-height:1.25}
  .flash-hint{font-size:.85rem;color:var(--muted)}
  .flash-back{font-size:1.18rem;line-height:1.55;font-weight:400;border-top:1px dashed #ccc;padding-top:14px}
  .flash-buttons{display:flex;gap:10px;margin-top:6px}

  /* MC */
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{font-family:inherit;font-size:1.02rem;text-align:left;border:2px solid var(--line);
    background:#fff;border-radius:9px;padding:12px 15px;cursor:pointer;transition:background .12s;
    display:flex;gap:10px;align-items:center;font-weight:500}
  .opt:hover:not(:disabled){background:var(--soft)}
  .opt .key{font-size:.78rem;font-weight:700;border:1.5px solid #bbb;border-radius:5px;
    width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;flex:none}
  .opt.correct{background:var(--good-bg);border-color:var(--good)}
  .opt.wrong{background:var(--bad-bg);border-color:var(--bad)}
  .opt:disabled{cursor:default}

  /* type */
  .type-row{display:flex;gap:10px;flex-wrap:wrap}
  .type-input{font-family:inherit;font-size:1.1rem;padding:11px 14px;border:2px solid #bbb;
    border-radius:9px;outline:none;flex:1;min-width:200px}
  .type-input:focus{border-color:var(--ink)}
  .type-input.correct{border-color:var(--good);background:var(--good-bg)}
  .type-input.wrong{border-color:var(--bad);background:var(--bad-bg)}

  .feedback{font-size:1.02rem;font-weight:600;min-height:1.3em;line-height:1.4}
  .feedback.good{color:var(--good)}
  .feedback.bad{color:var(--bad)}
  .reveal{font-size:1.02rem;line-height:1.5;background:var(--soft);border-radius:9px;
    padding:12px 14px;font-weight:400}
  .reveal b{font-weight:700}

  .btn{font-family:inherit;font-size:.95rem;font-weight:600;border:2px solid var(--line);
    background:#fff;border-radius:8px;padding:10px 18px;cursor:pointer;transition:background .15s}
  .btn:hover:not(:disabled){background:var(--soft)}
  .btn.primary{background:var(--ink);color:#fff}
  .btn.primary:hover:not(:disabled){background:#333}
  .btn.good{background:var(--good);color:#fff;border-color:var(--good)}
  .btn.bad{background:#fff;color:var(--bad);border-color:var(--bad)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn.ghost{border-color:#ccc;color:#555;font-weight:500}
  .btn.ghost:hover{background:var(--soft)}
  .btn.danger{color:var(--bad);border-color:#e3b5bc}

  .card-actions{display:flex;gap:10px;align-items:center;margin-top:14px;flex-wrap:wrap}
  .shortcuts{font-size:.78rem;color:var(--muted);margin-left:auto}
  kbd{font-family:inherit;font-size:.72rem;background:var(--chip);border:1px solid #ccc;
    border-bottom-width:2px;border-radius:4px;padding:1px 6px}

  .progress-panel{margin-top:26px;border:2px solid var(--line);border-radius:12px;padding:6px 18px 18px}
  .progress-panel summary{font-weight:600;font-size:1.05rem;cursor:pointer;padding:12px 0;list-style:none}
  .progress-panel summary::-webkit-details-marker{display:none}
  .progress-panel summary::before{content:'▸';margin-right:8px;display:inline-block;transition:transform .2s}
  .progress-panel[open] summary::before{transform:rotate(90deg)}
  .bar-row{margin:12px 0}
  .bar-top{display:flex;justify-content:space-between;font-size:.9rem;margin-bottom:5px}
  .bar-top .nm{font-weight:500}
  .bar-top .wt{color:var(--muted);font-weight:400}
  .bar-track{height:14px;background:var(--soft);border-radius:8px;overflow:hidden;border:1px solid #e2e2e2}
  .bar-fill{height:100%;background:var(--ink);width:0;transition:width .4s ease}
  .bar-fill.done{background:var(--good)}
  .bar-num{font-size:.78rem;color:var(--muted);margin-top:3px}

  .done-screen{text-align:center;padding:20px 0}
  .done-screen .big{font-size:2rem;font-weight:700;margin-bottom:8px}
  .done-screen .sub{color:var(--muted);font-size:1.05rem;margin-bottom:18px}

  @media(max-width:560px){
    .brand{font-size:1.5rem}
    .q-text{font-size:1.25rem}.flash-front{font-size:1.6rem}
    .stat .val{font-size:1.25rem}.shortcuts{display:none}
    .modes button{padding:9px 11px;font-size:.85rem}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">archive18 <span>quiz</span></div>
    <a class="study-link" href="index.html">&larr; Study sheet</a>
  </header>

  <div class="toolbar">
    <div class="modes" id="modes">
      <button data-mode="flash" class="active">Flashcards</button>
      <button data-mode="mc">Multiple choice</button>
      <button data-mode="type">Type answer</button>
    </div>
    <select id="domainFilter" aria-label="Filter by domain"></select>
  </div>

  <div class="stats">
    <div class="stat"><div class="lbl">Score</div><div class="val" id="score">0</div></div>
    <div class="stat"><div class="lbl">Streak</div><div class="val"><span id="streak">0</span> <span class="fire" id="fire"></span></div></div>
    <div class="stat"><div class="lbl">Best</div><div class="val" id="best">0</div></div>
    <div class="stat"><div class="lbl">Mastered</div><div class="val"><span id="masteredCount">0</span><span style="font-size:1rem;color:var(--muted)">/<span id="totalCount">0</span></span></div></div>
  </div>

  <section class="card" id="card"></section>

  <div class="card-actions" id="cardActions">
    <button class="btn primary" id="nextBtn" disabled>Next &rarr;</button>
    <button class="btn ghost" id="restartBtn">Restart round</button>
    <span class="shortcuts" id="shortcuts"></span>
  </div>

  <details class="progress-panel" open>
    <summary>Progress by domain</summary>
    <div id="bars"></div>
    <div style="margin-top:14px"><button class="btn ghost danger" id="resetBtn">Reset all progress</button></div>
  </details>

</div>

  updateStats(); nextCard();
}
function nextCard(){
  answered=false; revealed=false;
  $('nextBtn').disabled=true;
  if(pos>=queue.length){ renderDone(); return; }
  current = CARDS.find(c=>c.id===queue[pos]);
  render();
}
function advance(){ pos++; nextCard(); }

function mark(correct){
  if(answered) return;
  answered=true;
  if(correct){
    score++; streak++;
    if(streak>bestStreak) bestStreak=streak;
    mastered.add(current.id);
    saveProgress();
  } else {
    streak=0;
  }
  updateStats(); updateBars();
}

/* ---------- RENDER ---------- */
function render(){
  $('nextBtn').style.display = (mode==='flash') ? 'none' : '';
  if(mode==='flash') renderFlash();
  else if(mode==='mc') renderMC();
  else renderType();
  updateShortcuts();
}

function chipHTML(){ return '<span class="chip">'+esc(current.domain)+(current.sub?' &middot; '+esc(current.sub):'')+'</span>'; }

function renderFlash(){
  const c=current;
  $('card').innerHTML =
    chipHTML()+
    '<div class="q-label">Term</div>'+
    '<div class="flash-front">'+esc(c.front)+'</div>'+
    '<div id="flashBody"><div class="flash-hint">Tap card or press <kbd>Space</kbd> to reveal</div></div>';
  $('card').onclick = e=>{ if(!revealed && e.target.closest('.card') && !e.target.closest('button')) flip(); };
}
function flip(){
  if(revealed) return; revealed=true;
  const c=current;
  $('flashBody').innerHTML =
    '<div class="flash-back">'+esc(c.back)+'</div>'+
    '<div class="flash-buttons">'+
      '<button class="btn good" id="gotIt">Got it &#10003;</button>'+
      '<button class="btn bad" id="review">Review &#10007;</button>'+
    '</div>';
  $('gotIt').onclick = ()=>{ mark(true); advance(); };
  $('review').onclick = ()=>{ mark(false); advance(); };
}

function renderMC(){
  const c=current;
  const opts = mcOptions(c);
  let html = chipHTML()+
    '<div class="q-label">'+(c.kind==='port'?'Which port?':'Which term?')+'</div>'+
    '<div class="q-text'+(c.kind==='term'?' def':'')+'">'+esc(c.prompt)+'</div>'+
    '<div class="opts">';
  opts.forEach((o,i)=>{
    html += '<button class="opt" data-val="'+esc(o)+'"><span class="key">'+(i+1)+'</span><span>'+esc(o)+'</span></button>';
  });
  html += '</div><div class="feedback" id="fb"></div>';
  $('card').innerHTML = html; $('card').onclick=null;
  document.querySelectorAll('.opt').forEach(b=>b.onclick=()=>chooseMC(b,c));
}
function mcOptions(card){
  const others = CARDS.filter(c=>c.kind===card.kind && norm(c.answer)!==norm(card.answer));
  let dp = others.filter(c=>c.domain===card.domain);
  if(dp.length<6) dp = others;
  const seen=new Set([norm(card.answer)]); const picks=[];
  for(const c of shuffle(dp)){ const n=norm(c.answer);
    if(!seen.has(n)){ seen.add(n); picks.push(c.answer);} if(picks.length===3)break; }
  return shuffle([card.answer,...picks]);
}
function chooseMC(btn,c){
  if(answered) return;
  const correct = norm(btn.dataset.val)===norm(c.answer);
  mark(correct);
  document.querySelectorAll('.opt').forEach(b=>{
    b.disabled=true;
    if(norm(b.dataset.val)===norm(c.answer)) b.classList.add('correct');
  });
  if(!correct) btn.classList.add('wrong');
  const fb=$('fb');
  fb.textContent = correct ? '✓ Correct' : '✗ Answer: '+c.answer;
  fb.className = 'feedback '+(correct?'good':'bad');
  $('nextBtn').disabled=false; $('nextBtn').focus();
}

function renderType(){
  const c=current;
  $('card').innerHTML =
    chipHTML()+
    '<div class="q-label">'+(c.kind==='port'?'Type the port number':'Type the term')+'</div>'+
    '<div class="q-text'+(c.kind==='term'?' def':'')+'">'+esc(c.prompt)+'</div>'+
    '<div class="type-row">'+
      '<input class="type-input" id="ti" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="'+(c.kind==='port'?'e.g. 443':'your answer')+'">'+
      '<button class="btn primary" id="submitT">Check</button>'+
    '</div>'+
    '<div class="feedback" id="fb"></div><div id="rev"></div>';
  $('card').onclick=null;
  const ti=$('ti');
  ti.focus();
  ti.addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault(); submitType();}});
  $('submitT').onclick=submitType;
}
function submitType(){
  if(answered) return;
  const c=current; const ti=$('ti');
  const val=ti.value.trim(); if(!val) return;
  const correct = c.accept.includes(norm(val)) || norm(val)===norm(c.answer);
  mark(correct);
  ti.classList.add(correct?'correct':'wrong'); ti.disabled=true;
  $('submitT').disabled=true;
  const fb=$('fb');
  fb.textContent = correct ? '✓ Correct' : '✗ Not quite';
  fb.className='feedback '+(correct?'good':'bad');
  $('rev').innerHTML = '<div class="reveal"><b>'+esc(c.answer)+'</b>'+
     (c.kind==='term' ? ' &mdash; '+esc(c.back) : '  ('+esc(c.front)+')')+'</div>'+
     (correct? '' :
      '<div style="margin-top:10px"><button class="btn ghost" id="override">I was right &#8212; mark correct</button></div>');
  if(!correct){
    $('override').onclick=()=>{
      if(answered && !mastered.has(current.id)){
        score++; streak++; if(streak>bestStreak)bestStreak=streak;
        mastered.add(current.id); saveProgress();
        ti.classList.remove('wrong'); ti.classList.add('correct');
        fb.textContent='✓ Marked correct'; fb.className='feedback good';
        updateStats(); updateBars(); $('override').remove();
      }
    };
  }
  $('nextBtn').disabled=false; $('nextBtn').focus();
}

function renderDone(){
  const total=poolCards().length;
  $('card').innerHTML =
    '<div class="done-screen">'+
      '<div class="big">Round complete &#127881;</div>'+
      '<div class="sub">You scored <b>'+score+'</b> / '+total+' this round &middot; best streak '+bestStreak+'</div>'+
      '<button class="btn primary" id="againBtn">Go again</button>'+
    '</div>';
  $('card').onclick=null;
  $('againBtn').onclick=startRound;
  $('nextBtn').disabled=true; $('nextBtn').style.display='none';
}

/* ---------- STATS / BARS ---------- */
function updateStats(){
  $('score').textContent=score;
  $('streak').textContent=streak;
  $('best').textContent=bestStreak;
  $('fire').textContent = streak>=3 ? '\u{1F525}' : '';
  $('masteredCount').textContent=mastered.size;
  $('totalCount').textContent=CARDS.length;
}
function buildBars(){
  let html='';
  DOMAINS.forEach(d=>{
    const total=CARDS.filter(c=>c.domain===d.name).length;
    html += '<div class="bar-row" data-d="'+esc(d.name)+'">'+
      '<div class="bar-top"><span class="nm">'+esc(d.name)+'</span>'+
        '<span class="wt">'+(d.weight==='ref'?'reference':'exam '+d.weight)+'</span></div>'+
      '<div class="bar-track"><div class="bar-fill"></div></div>'+
      '<div class="bar-num"><span class="m">0</span> / '+total+' mastered</div>'+
    '</div>';
  });
  $('bars').innerHTML=html;
}
function updateBars(){
  DOMAINS.forEach(d=>{
    const ids=CARDS.filter(c=>c.domain===d.name);
    const m=ids.filter(c=>mastered.has(c.id)).length;
    const pct = ids.length? Math.round(m/ids.length*100):0;
    const row=document.querySelector('.bar-row[data-d="'+d.name+'"]');
    if(!row) return;
    const fill=row.querySelector('.bar-fill');
    fill.style.width=pct+'%';
    fill.classList.toggle('done', pct===100);
    row.querySelector('.m').textContent=m;
  });
}

/* ---------- SHORTCUTS / GLOBAL KEYS ---------- */
function updateShortcuts(){
  let s='';
  if(mode==='flash') s='<kbd>Space</kbd> flip &nbsp; <kbd>G</kbd> got it &nbsp; <kbd>R</kbd> review';
  else if(mode==='mc') s='<kbd>1</kbd>&ndash;<kbd>4</kbd> pick &nbsp; <kbd>Enter</kbd> next';
  else s='<kbd>Enter</kbd> check / next';
  $('shortcuts').innerHTML=s;
}
document.addEventListener('keydown',e=>{
  const typing = e.target.tagName==='INPUT';
  if(mode==='flash'){
    if(e.code==='Space'){ e.preventDefault(); if(!revealed) flip(); }
    else if(!typing && revealed && (e.key==='g'||e.key==='G')){ mark(true); advance(); }
    else if(!typing && revealed && (e.key==='r'||e.key==='R')){ mark(false); advance(); }
  }
  if(mode==='mc' && !answered && !typing){
    const n=parseInt(e.key,10);
    if(n>=1&&n<=4){ const b=document.querySelectorAll('.opt')[n-1]; if(b) b.click(); }
  }
  if(e.key==='Enter' && answered && !$('nextBtn').disabled && $('nextBtn').style.display!=='none'){
    advance();
  }
});

/* ---------- WIRING ---------- */
function setMode(m){
  mode=m;
  document.querySelectorAll('#modes button').forEach(b=>b.classList.toggle('active',b.dataset.mode===m));
  if(current && pos<queue.length) render(); else startRound();
}
function buildFilter(){
  let html='<option value="all">All domains ('+CARDS.length+')</option>';
  DOMAINS.forEach(d=>{
    const n=CARDS.filter(c=>c.domain===d.name).length;
    html+='<option value="'+esc(d.name)+'">'+esc(d.name)+' ('+n+')</option>';
  });
  $('domainFilter').innerHTML=html;
}

document.querySelectorAll('#modes button').forEach(b=>b.onclick=()=>setMode(b.dataset.mode));
$('domainFilter').onchange=e=>{ filter=e.target.value; startRound(); };
$('nextBtn').onclick=advance;
$('restartBtn').onclick=startRound;
$('resetBtn').onclick=()=>{
  if(!confirm('Reset all mastery progress and best streak?')) return;
  mastered=new Set(); bestStreak=0; saveProgress();
  updateStats(); updateBars();
};

loadProgress();
buildFilter();
buildBars();
updateStats();
updateBars();
startRound();
</script>
</body>
</html>
